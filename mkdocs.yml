site_name: Muhammad Hasan
site_url: https://hasan-ston.github.io/
site_author: Muhammad Hasan
site_description: Building production systems and figuring out how backend engineering and AI fit together.

theme:
  name: material
  palette:
    # Light mode
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.integrate
  icon:
    repo: fontawesome/brands/github

repo_url: https://github.com/hasan-ston
repo_name: hasan-ston

nav:
  - Home: index.md
  - Projects: projects/index.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details

plugins:
  - search
  - macros:
      module_name: main

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/hasan-ston
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/muhammad-hasan-139064379
    - icon: fontawesome/solid/envelope
      link: mailto:mhd.hasan236@gmail.com

extra_css:
  - stylesheets/extra.css

copyright: Copyright &copy; 2025 Muhammad Hasan
